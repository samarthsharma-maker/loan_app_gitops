# ExternalSecret syncs the RDS password from AWS Secrets Manager into a K8s Secret.
# Requires External Secrets Operator installed in the cluster (see README).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: backend-db-secret
  namespace: loanhub
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: backend-db-secret
    creationPolicy: Owner
  data:
    - secretKey: SPRING_DATASOURCE_PASSWORD
      remoteRef:
        key: loanhub/loanhub-dev/db-password
        property: password
